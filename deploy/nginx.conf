upstream backend_api {
  least_conn;
  server api:6039 max_fails=1 fail_timeout=5s;
  server api2:6040 max_fails=1 fail_timeout=5s;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 100m;

  location / {
    error_page 503 = @maintenance_page;
    if (-f /usr/share/nginx/html/.maintenance) {
      return 503;
    }
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/resource/sse/ {
    error_page 502 503 504 = @api_unavailable;
    if (-f /usr/share/nginx/html/.maintenance) {
      return 503;
    }
    proxy_pass http://backend_api/resource/sse/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 2;
  }

  location /api/ {
    error_page 502 503 504 = @api_unavailable;
    if (-f /usr/share/nginx/html/.maintenance) {
      return 503;
    }
    proxy_pass http://backend_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 2;
  }

  location /minio/ {
    proxy_pass http://minio:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location @maintenance_page {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store" always;
    try_files /maintenance.html =503;
  }

  location @api_unavailable {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    return 503 '{"code":503,"msg":"服务维护中，请稍后再试"}';
  }
}
